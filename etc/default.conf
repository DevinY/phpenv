server {
    listen 80;
    server_name _;

    #專案目錄，公開目錄為public
    set $basepath "/var/www/html";
    root $basepath/public;

    index index.php index.html;

    client_max_body_size 50m;

    # 修正 1：處理真實 IP
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    location / {
        # 修正 2：WordPress 標準的路由重寫 (原本的 /?$query_string 在某些 WP 外掛會出錯)
        try_files $uri $uri/ /index.php?$args;
    }

    # 修正 3：移除結尾斜線的 rewrite（非必要，try_files 處理即可，若要保留請確認路徑）
    # if (!-d $request_filename) {
    #    rewrite ^/(.+)/$ /$1 permanent;
    # }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 指向你的 PHP 容器名稱
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        # 修正 4：確保 PHP 知道原始請求的 Host 與協定
        # 這能防止 WordPress 自動在連結中補上 :5000
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # 讓 PHP 知道前端是 HTTPS (由 NAS 代理傳過來的標頭決定)
        set $my_https "off";
        if ($http_x_forwarded_proto = "https") { set $my_https "on"; }
        fastcgi_param HTTPS $my_https;

        fastcgi_read_timeout 500;
    }
}
